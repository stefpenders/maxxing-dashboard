<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0b">
<title>Inloggen</title>
<style>
  :root { --bg:#0a0a0b; --card:#111113; --border:rgba(255,255,255,0.08); --text-1:#f2f2f2; --text-3:rgba(255,255,255,0.4); --accent:#6ee7b7; }
  * { box-sizing: border-box; touch-action: manipulation; }
  body {
    margin: 0; min-height: 100vh; background: var(--bg); color: var(--text-1);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .box { width: 100%; max-width: 340px; text-align: center; }
  h1 { font-size: 22px; margin: 0 0 6px; }
  p { color: var(--text-3); font-size: 14px; margin: 0 0 28px; }
  input {
    width: 100%; padding: 16px; font-size: 18px; text-align: center;
    border: 1px solid var(--border); border-radius: 12px;
    background: rgba(255,255,255,0.04); color: #fff; margin-bottom: 14px;
    -webkit-appearance: none;
  }
  button {
    width: 100%; padding: 16px; font-size: 16px; font-weight: 700;
    border: none; border-radius: 12px; background: var(--accent); color: #0a0a0b; cursor: pointer;
  }
  .err { color: #ff8a8a; font-size: 13px; margin-top: 14px; display: none; }
  .err.show { display: block; }
</style>
</head>
<body>
<div class="box">
  <h1>Welkom 👋</h1>
  <p>Vul je toegangscode in om je eigen dashboard te openen.</p>
  <input type="text" id="codeInput" placeholder="Toegangscode" autocomplete="off" autocapitalize="off" spellcheck="false">
  <button id="goBtn">Inloggen</button>
  <div class="err" id="errMsg">Onbekende code, probeer het nog eens.</div>
</div>

<script>
  // Voeg hier nieuwe vrienden toe: simpele code die je zelf verzint en doorstuurt.
  const FRIEND_CODES = [
    'floor',
    'maartje',
    'sander',
  ];

  const $ = id => document.getElementById(id);

  function tryLogin() {
    const code = ($('codeInput').value || '').trim().toLowerCase();
    if (!FRIEND_CODES.map(c => c.toLowerCase()).includes(code)) {
      $('errMsg').classList.add('show');
      return;
    }
    $('errMsg').classList.remove('show');
    localStorage.setItem('maxx_active_user', code);
    window.location.href = 'checklist.html';
  }

  $('goBtn').addEventListener('click', tryLogin);
  $('codeInput').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

  // Als er al een sessie actief is op dit apparaat, meteen doorsturen.
  if (localStorage.getItem('maxx_active_user')) {
    window.location.href = 'checklist.html';
  }
</script>
</body>
</html>
